<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenyte Technologies</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #020817;
      --panel: rgba(6, 17, 31, 0.96);
      --card: rgba(7, 18, 34, 0.92);
      --border: rgba(150, 237, 255, 0.14);
      --accent: #96EDFF;
      --text: #ffffff;
      --muted: #cbd5e1;
      --soft: #94a3b8;
      --sidebar-width: 280px;
      --topbar-height: 84px;
      --radius: 18px;
      --shadow: 0 16px 32px rgba(0, 0, 0, 0.32);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(2, 8, 23, 0.95), rgba(2, 8, 23, 0.97)),
        url("Images/index-hero.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .app {
      min-height: 100vh;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(2, 8, 23, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-toggle {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(7, 17, 31, 0.92);
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .menu-toggle:hover {
      transform: translateY(-1px);
      background: rgba(10, 24, 43, 0.96);
    }

    .hamburger {
      width: 18px;
      height: 14px;
      position: relative;
      display: block;
    }

    .hamburger span {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
      transition: 0.25s ease;
    }

    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 6px; }
    .hamburger span:nth-child(3) { top: 12px; }

    .app.menu-open .hamburger span:nth-child(1) {
      top: 6px;
      transform: rotate(45deg);
    }

    .app.menu-open .hamburger span:nth-child(2) {
      opacity: 0;
    }

    .app.menu-open .hamburger span:nth-child(3) {
      top: 6px;
      transform: rotate(-45deg);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .brand img {
      height: 52px;
      width: auto;
      flex-shrink: 0;
    }

    .brand-text {
      line-height: 1;
      text-align: left;
      width: 160px;
      flex-shrink: 0;
    }

    .brand-text .top {
      display: block;
      width: 100%;
      font-size: 1.18rem;
      font-weight: 800;
      letter-spacing: 1.6px;
      color: var(--text);
    }

    .brand-text .bottom {
      display: block;
      width: 100%;
      margin-top: 5px;
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--accent);
      white-space: nowrap;
    }

    .sidebar {
      position: fixed;
      top: var(--topbar-height);
      left: 0;
      bottom: 0;
      width: var(--sidebar-width);
      background: linear-gradient(180deg, rgba(5, 15, 30, 0.97), rgba(3, 11, 22, 0.98));
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 950;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .app.menu-open .sidebar {
      transform: translateX(0);
    }

    .sidebar-inner {
      padding: 18px 14px 22px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 6px 6px 10px;
    }

    .sidebar-title {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .close-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(7, 17, 31, 0.92);
      color: var(--accent);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .menu-group {
      display: grid;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 58px;
      padding: 0 16px;
      border-radius: 14px;
      background: rgba(8, 22, 40, 0.45);
      border: 1px solid rgba(150, 237, 255, 0.1);
      color: var(--text);
      transition: 0.2s ease;
    }

    .menu-item:hover {
      color: var(--accent);
      background: rgba(150, 237, 255, 0.08);
      border-color: rgba(150, 237, 255, 0.16);
    }

    .menu-item.active {
      color: var(--accent);
      background: rgba(150, 237, 255, 0.12);
      border-color: rgba(150, 237, 255, 0.18);
    }

    .menu-icon {
      width: 28px;
      text-align: center;
      color: var(--accent);
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .menu-label {
      font-size: 0.98rem;
      font-weight: 600;
    }

    .overlay {
      position: fixed;
      inset: var(--topbar-height) 0 0 0;
      background: rgba(0, 0, 0, 0.34);
      opacity: 0;
      visibility: hidden;
      transition: 0.25s ease;
      z-index: 900;
    }

    .app.menu-open .overlay {
      opacity: 1;
      visibility: visible;
    }

    .content {
      padding: 18px;
      transition: margin-left 0.3s ease, width 0.3s ease;
      width: 100%;
    }

    .app.menu-open .content {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .hero-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 400px;
      background: rgba(4, 15, 30, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: 34px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(to right, rgba(4, 15, 30, 0.98), rgba(4, 15, 30, 0.84));
    }

    .eyebrow {
      display: inline-block;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero-copy h1 {
      margin: 0 0 18px;
      font-size: 3.1rem;
      line-height: 1.1;
      font-weight: 700;
      max-width: 620px;
    }

    .hero-copy h1 .accent {
      color: var(--accent);
    }

    .hero-copy p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
      max-width: 560px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 210px;
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #7ed4e6 0%, var(--accent) 100%);
      color: #03111f;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
    }

    @keyframes fadeInHeroImage {
      from {
        opacity: 0;
        transform: scale(1.02);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .hero-visual {
      position: relative;
      background:
        linear-gradient(rgba(3, 12, 26, 0.08), rgba(3, 12, 26, 0.16)),
        url("Images/index-hero.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      animation: fadeInHeroImage 1.2s ease-out forwards;
    }

    .hero-visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to left, rgba(2, 8, 23, 0.03), rgba(2, 8, 23, 0.14));
      pointer-events: none;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .service-card {
      min-height: 250px;
      background: rgba(4, 15, 30, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
    }

    .service-card .icon {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(150, 237, 255, 0.24);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.45rem;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .service-card h3 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .service-card p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
      flex-grow: 1;
    }

    .service-card .learn-more {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 0.94rem;
      font-weight: 600;
    }

    @media (max-width: 1200px) {
      .hero-card {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 320px;
      }
    }

    @media (max-width: 980px) {
      .app.menu-open .content {
        margin-left: 0;
        width: 100%;
      }

      .sidebar {
        top: 0;
        width: min(86vw, 320px);
      }

      .overlay {
        inset: 0;
      }

      .topbar {
        height: 82px;
        padding: 0 16px;
      }

      .brand img {
        height: 44px;
      }

      .brand-text {
        width: 150px;
      }

      .brand-text .top {
        font-size: 1rem;
      }

      .brand-text .bottom {
        font-size: 0.5rem;
        letter-spacing: 5.8px;
      }

      .content {
        padding: 14px;
      }

      .services-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-copy {
        padding: 26px 22px;
      }

      .hero-copy h1 {
        font-size: 2.35rem;
      }

      .hero-copy p {
        font-size: 1rem;
      }
    }

    @media (max-width: 640px) {
      .brand-text {
        display: none;
      }

      .brand img {
        height: 42px;
      }

      .menu-toggle {
        width: 46px;
        height: 46px;
      }

      .hero-card {
        min-height: auto;
      }

      .hero-copy h1 {
        font-size: 1.95rem;
      }

      .hero-actions {
        flex-direction: column;
        align-items: flex-start;
      }

      .primary-btn {
        width: 100%;
        max-width: 240px;
      }

      .services-grid {
        grid-template-columns: 1fr;
      }

      .service-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
          <span class="hamburger">
            <span></span><span></span><span></span>
          </span>
        </button>
      </div>

      <a href="index.html" class="brand" data-track="brand_logo_click">
        <img id="brandLogo" src="Images/Logo.png" alt="Zenyte Technologies Logo">
        <div class="brand-text">
          <span class="top" id="brandTop">ZENYTE</span>
          <span class="bottom" id="brandBottom">TECHNOLOGIES</span>
        </div>
      </a>
    </header>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <div class="sidebar-title">Navigation</div>
          <button class="close-btn" id="closeMenu" aria-label="Close menu">✕</button>
        </div>

        <nav class="menu-group" id="navMenu"></nav>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="content">
      <div class="dashboard">
        <section class="hero-card">
          <div class="hero-copy">
            <span class="eyebrow" id="heroEyebrow"></span>

            <h1 id="heroTitle"></h1>

            <p id="heroDescription"></p>

            <div class="hero-actions">
              <button class="primary-btn" id="heroButton"></button>
            </div>
          </div>

          <div class="hero-visual" id="heroVisual" aria-hidden="true"></div>
        </section>

        <section class="services-grid" id="servicesGrid"></section>
      </div>
    </main>
  </div>

  <script>
    const SITE_CONTENT = {
      global: {
        brandTop: "ZENYTE",
        brandBottom: "TECHNOLOGIES",
        logo: "Images/Logo.png"
      },
      hero: {
        eyebrow: "Welcome to Zenyte Technologies",
        title: 'Technology Solutions<br>That <span class="accent">Power</span> Your Business',
        description: "We deliver reliable IT services designed to enhance performance, strengthen security, and drive growth.",
        buttonLabel: "Explore Our Services",
        buttonUrl: "cloud-services.html",
        image: "Images/index-hero.jpg"
      },
      navigation: [
        { label: "Home", url: "index.html", icon: "⌂", active: true },
        { label: "Network", url: "network.html", icon: "⛶", active: false },
        { label: "Enterprise Set-up", url: "enterprise-setup.html", icon: "▦", active: false },
        { label: "Cloud Services", url: "cloud-services.html", icon: "☁", active: false },
        { label: "Cyber Security", url: "cyber-security.html", icon: "🛡", active: false },
        { label: "Computer Repair", url: "computer-repair.html", icon: "🛠", active: false },
        { label: "Infrastructure Consulting", url: "infrastructure-consulting.html", icon: "▣", active: false }
      ],
      services: [
        {
          title: "Network",
          description: "Reliable network solutions that keep your business connected.",
          icon: "⛶",
          url: "network.html"
        },
        {
          title: "Enterprise Set-up",
          description: "Complete enterprise IT setup tailored to your business needs.",
          icon: "▦",
          url: "enterprise-setup.html"
        },
        {
          title: "Cloud Services",
          description: "Scalable cloud solutions for flexibility, security, and growth.",
          icon: "☁",
          url: "cloud-services.html"
        },
        {
          title: "Cyber Security",
          description: "Advanced security measures to protect what matters most.",
          icon: "🛡",
          url: "cyber-security.html"
        },
        {
          title: "Computer Repair",
          description: "Fast and reliable repair services for all your devices.",
          icon: "🛠",
          url: "computer-repair.html"
        },
        {
          title: "Infrastructure Consulting",
          description: "Expert guidance to build a strong and efficient IT foundation.",
          icon: "▣",
          url: "infrastructure-consulting.html"
        }
      ]
    };

    const app = document.getElementById("app");
    const menuToggle = document.getElementById("menuToggle");
    const closeMenu = document.getElementById("closeMenu");
    const overlay = document.getElementById("overlay");
    const navMenu = document.getElementById("navMenu");
    const servicesGrid = document.getElementById("servicesGrid");

    function trackEvent(eventName, eventData = {}) {
      console.log("Track event:", eventName, eventData);

      if (typeof window.gtag === "function") {
        window.gtag("event", eventName, eventData);
      }
    }

    function renderGlobalContent() {
      document.getElementById("brandTop").textContent = SITE_CONTENT.global.brandTop;
      document.getElementById("brandBottom").textContent = SITE_CONTENT.global.brandBottom;
      document.getElementById("brandLogo").src = SITE_CONTENT.global.logo;
    }

    function renderHero() {
      document.getElementById("heroEyebrow").textContent = SITE_CONTENT.hero.eyebrow;
      document.getElementById("heroTitle").innerHTML = SITE_CONTENT.hero.title;
      document.getElementById("heroDescription").textContent = SITE_CONTENT.hero.description;

      const heroButton = document.getElementById("heroButton");
      heroButton.innerHTML = `<span>${SITE_CONTENT.hero.buttonLabel}</span><span>→</span>`;
      heroButton.addEventListener("click", () => {
        trackEvent("hero_button_click", {
          label: SITE_CONTENT.hero.buttonLabel,
          destination: SITE_CONTENT.hero.buttonUrl
        });
        window.location.href = SITE_CONTENT.hero.buttonUrl;
      });

      document.getElementById("heroVisual").style.background =
        `linear-gradient(rgba(3, 12, 26, 0.08), rgba(3, 12, 26, 0.16)), url("${SITE_CONTENT.hero.image}") center / cover no-repeat`;
    }

    function renderNavigation() {
      navMenu.innerHTML = SITE_CONTENT.navigation.map(item => `
        <a href="${item.url}" class="menu-item ${item.active ? "active" : ""}" data-nav-label="${item.label}">
          <span class="menu-icon">${item.icon}</span>
          <span class="menu-label">${item.label}</span>
        </a>
      `).join("");

      navMenu.querySelectorAll(".menu-item").forEach(item => {
        item.addEventListener("click", () => {
          trackEvent("nav_click", {
            label: item.dataset.navLabel
          });
        });
      });
    }

    function renderServices() {
      servicesGrid.innerHTML = SITE_CONTENT.services.map(service => `
        <a href="${service.url}" class="service-card" data-service-title="${service.title}">
          <div class="icon">${service.icon}</div>
          <h3>${service.title}</h3>
          <p>${service.description}</p>
          <span class="learn-more">Learn More <span>→</span></span>
        </a>
      `).join("");

      servicesGrid.querySelectorAll(".service-card").forEach(card => {
        card.addEventListener("click", () => {
          trackEvent("service_card_click", {
            label: card.dataset.serviceTitle
          });
        });
      });
    }

    function openMenu() {
      app.classList.add("menu-open");
      menuToggle.setAttribute("aria-expanded", "true");
      trackEvent("menu_open");
    }

    function closeSidebar() {
      app.classList.remove("menu-open");
      menuToggle.setAttribute("aria-expanded", "false");
    }

    function toggleMenu() {
      if (app.classList.contains("menu-open")) {
        closeSidebar();
      } else {
        openMenu();
      }
    }

    function initPageViewTracking() {
      trackEvent("page_view", {
        page: "home"
      });
    }

    function initTrackedLinks() {
      document.querySelectorAll("[data-track]").forEach(link => {
        link.addEventListener("click", () => {
          trackEvent(link.dataset.track);
        });
      });
    }

    renderGlobalContent();
    renderHero();
    renderNavigation();
    renderServices();
    initPageViewTracking();
    initTrackedLinks();

    menuToggle.addEventListener("click", toggleMenu);
    closeMenu.addEventListener("click", closeSidebar);
    overlay.addEventListener("click", closeSidebar);

    window.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeSidebar();
      }
    });

    window.addEventListener("resize", function() {
      if (window.innerWidth <= 980) {
        closeSidebar();
      }
    });
  </script>
</body>
</html>
